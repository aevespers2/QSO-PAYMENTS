name: Consent Capacity Lock

on:
  pull_request:
    paths:
      - '.consent/consent-capacity-lock-v1.json'
      - 'scripts/validate_consent_lock.py'
      - 'tests/test_consent_lock.py'
      - '.github/workflows/consent-capacity-lock.yml'
      - '**.md'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.tsx'
      - '**.jsx'
      - '**.toml'
      - '**.ini'
      - '**.txt'
      - '**.sh'
  push:
    branches: [main]
    paths:
      - '.consent/consent-capacity-lock-v1.json'
      - 'scripts/validate_consent_lock.py'
      - 'tests/test_consent_lock.py'
      - '.github/workflows/consent-capacity-lock.yml'
      - '**.md'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.tsx'
      - '**.jsx'
      - '**.toml'
      - '**.ini'
      - '**.txt'
      - '**.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: consent-lock-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  consent-lock:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact source and clean worktree
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'

      - name: Run consent-lock regression tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/consent-lock
          python -m unittest discover -s tests -p 'test_consent_lock.py' -v 2>&1 \
            | tee reports/consent-lock/tests.log

      - name: Validate repository-wide consent lock
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_consent_lock.py 2>&1 \
            | tee reports/consent-lock/validation.log

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/consent-lock
          cp reports/consent-lock-validation.json reports/consent-lock/report.json 2>/dev/null || true
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'submitted_sha=%s\n' "$EXPECTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'policy_scope=all-files-all-agents-all-interfaces-all-humans-all-ai\n'
            printf 'per_file_marker_required=false\n'
            printf 'payment_authority=false\n'
            printf 'automatic_unlock=false\n'
            printf 'python=%s\n' "$(python --version 2>&1)"
          } > reports/consent-lock/run-summary.txt
          git status --porcelain=v1 > reports/consent-lock/worktree-status.txt
          sha256sum \
            .consent/consent-capacity-lock-v1.json \
            scripts/validate_consent_lock.py \
            tests/test_consent_lock.py \
            .github/workflows/consent-capacity-lock.yml \
            > reports/consent-lock/source.sha256
          find reports/consent-lock -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 -r sha256sum > reports/consent-lock/SHA256SUMS

      - name: Upload consent-lock evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: consent-lock-${{ env.EXPECTED_SHA }}
          path: reports/consent-lock
          if-no-files-found: error
          retention-days: 90
